<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本高亮</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>文本高亮</h1>
            <a href="/rules" class="rule-btn">规则文档</a>
        </header>
        
        <main>
            <div class="input-section">
                <textarea id="inputText" placeholder="请输入文本..."></textarea>
            </div>
            
            <div class="output-section">
                <div id="outputResult">输出结果将显示在这里</div>
            </div>
        </main>
        
        <footer>
            <button class="submit-btn" id="submitBtn">提交</button>
        </footer>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
